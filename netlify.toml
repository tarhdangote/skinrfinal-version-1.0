[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"
  SECRETS_SCAN_OMIT_KEYS = "VITE_SENTRY_DSN,GMAIL_USER"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["pdfkit", "nodemailer"]

[[redirects]]
  from   = "/api/claude"
  to     = "/.netlify/functions/claude"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
